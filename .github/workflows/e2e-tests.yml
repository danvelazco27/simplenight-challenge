name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  check-accessibility:
    name: Check Staging Access
    runs-on: ubuntu-latest
    steps:
      - name: Verify Simplenight staging is accessible
        run: |
          echo "Checking https://wl.stg.simplenight.com/ from CI runner..."
          curl -I -L --max-redirs 5 --connect-timeout 10 --fail https://wl.stg.simplenight.com/
          echo "✅ Staging access verified"

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-and-format, check-accessibility]
    permissions:
      checks: write
      contents: read
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_registry: https://registry.npmjs.org

      # ── 4. Cache Playwright browsers ────────────────────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      # ── 5. Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # ── 6. Install system dependencies (when cache hit) ─────────────────────
      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── 7. Run E2E tests ────────────────────────────────────────────────────
      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=chromium
        env:
          CI: 'true'
          BASE_URL: https://wl.stg.simplenight.com

      # ── 8. Upload test results artifacts ────────────────────────────────────
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-reports-${{ github.run_id }}
          path: |
            html-report/
            junit-report/
          retention-days: 30

      # ── 9. Upload screenshots and videos on failure ─────────────────────────
      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      # ── 10. Publish JUnit test results ──────────────────────────────────────
      - name: Publish JUnit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results
          path: junit-report/results.xml
          reporter: java-junit
          fail-on-error: false

      # ── 11. Create job summary with report links ────────────────────────────
      - name: Create job summary
        if: always()
        run: |
          echo "## E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Execution" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Browser**: Chromium" >> $GITHUB_STEP_SUMMARY
          echo "- **Framework**: Playwright + TypeScript" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **HTML Report**: Download from workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **JUnit Report**: Published to test results" >> $GITHUB_STEP_SUMMARY
